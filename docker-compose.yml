services:
  postgres:
    image: postgres:16-alpine
    container_name: clantrader-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: clantrader
      POSTGRES_PASSWORD: clantrader_dev_2026
      POSTGRES_DB: clantrader_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clantrader -d clantrader_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clantrader-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  glitchtip-web:
    image: glitchtip/glitchtip:latest
    container_name: glitchtip-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8100:8080"
    environment:
      DATABASE_URL: postgresql://clantrader:clantrader_dev_2026@postgres:5432/glitchtip
      REDIS_URL: redis://redis:6379/2
      SECRET_KEY: ee4fb2519d5748c526fdd2f1eac0e85b46c36808114a36561dae15049823ff9a
      PORT: "8080"
      GLITCHTIP_DOMAIN: https://clantrader.com:8100
      DEFAULT_FROM_EMAIL: glitchtip@clantrader.com
      CELERY_WORKER_AUTOSCALE: "1,3"
      CELERY_WORKER_MAX_TASKS_PER_CHILD: "10000"

  glitchtip-worker:
    image: glitchtip/glitchtip:latest
    container_name: glitchtip-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ./bin/run-celery-with-beat.sh
    environment:
      DATABASE_URL: postgresql://clantrader:clantrader_dev_2026@postgres:5432/glitchtip
      REDIS_URL: redis://redis:6379/2
      SECRET_KEY: ee4fb2519d5748c526fdd2f1eac0e85b46c36808114a36561dae15049823ff9a
      CELERY_WORKER_AUTOSCALE: "1,3"
      CELERY_WORKER_MAX_TASKS_PER_CHILD: "10000"

volumes:
  pgdata:
  redisdata:
